name: Nexus Sync — CI/CD Pipeline

on:
  push:
    branches:
      - main       # Production deployment
      - staging    # Staging deployment
      - dev        # Dev build only (no deploy)
  pull_request:
    branches:
      - main
      - staging

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: nexus-control-tower
  S3_BUCKET: nexus-sync-artifacts-802346121670
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ─── JOB 1: Lint & Basic Validation ──────────────────────────────────────
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyflakes

      - name: Run syntax check on main app
        run: python -m pyflakes automation/NexusSyncPro_Advanced.py || true

      - name: Run syntax check on bot
        run: python -m pyflakes automation/WhatsApp_Nexus_Bot/NexusBot.py || true

  # ─── JOB 2: Build Windows EXE (runs only on main) ──────────────────────
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter pandas selenium webdriver_manager python-dotenv openpyxl requests beautifulsoup4 schedule

      - name: Build EXE with PyInstaller
        working-directory: automation
        run: pyinstaller --noconfirm NexusSyncPro_Advanced.spec

      - name: Rename EXE with version tag
        working-directory: automation
        shell: powershell
        run: |
          $version = (Get-Date -Format "yyyy.MM.dd")
          $src = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          $dest = "dist/Ashish_Kumar_NexusSyncPro_$version.exe"
          Rename-Item $src.FullName $dest
          echo "EXE_NAME=Ashish_Kumar_NexusSyncPro_$version.exe" >> $env:GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload EXE to S3
        working-directory: automation
        shell: powershell
        run: |
          aws s3 cp dist/${{ env.EXE_NAME }} s3://${{ env.S3_BUCKET }}/releases/${{ env.EXE_NAME }}
          aws s3 cp dist/${{ env.EXE_NAME }} s3://${{ env.S3_BUCKET }}/releases/latest.exe
          Write-Host "✅ EXE uploaded to S3 as ${{ env.EXE_NAME }} and latest.exe"

  # ─── JOB 3: Build & Push Docker Image to ECR ────────────────────────────
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          # Also tag as 'latest' for easy reference
          docker tag $IMAGE_URI $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "✅ Docker image pushed: $IMAGE_URI"

  # ─── JOB 4: Deploy to AWS ECS ────────────────────────────────────────────
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition nexus-control-tower \
            --query taskDefinition \
            --output json | python3 -c "
          import sys, json
          td = json.load(sys.stdin)
          for key in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']:
              td.pop(key, None)
          print(json.dumps(td))
          " > task-definition-clean.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-clean.json
          container-name: nexus-control-tower
          image: ${{ needs.build-docker.outputs.image_uri }}

      - name: Inject AWS credentials and secrets AFTER render (prevents stripping)
        run: |
          RENDERED="${{ steps.task-def.outputs.task-definition }}"
          python3 -c "
          import json, sys

          with open('$RENDERED') as f:
              td = json.load(f)

          env = td['containerDefinitions'][0]['environment']

          # Remove any stale copies of these keys to avoid duplicates
          keys_to_inject = {'AWS_ACCESS_KEY_ID','AWS_SECRET_ACCESS_KEY','AWS_DEFAULT_REGION','TG_BOT_TOKEN','TG_ADMIN_CHAT','ADMIN_SECRET'}
          env = [e for e in env if e['name'] not in keys_to_inject]

          # Inject fresh values
          env += [
              {'name': 'AWS_ACCESS_KEY_ID',     'value': '${{ secrets.AWS_ACCESS_KEY_ID }}'},
              {'name': 'AWS_SECRET_ACCESS_KEY', 'value': '${{ secrets.AWS_SECRET_ACCESS_KEY }}'},
              {'name': 'AWS_DEFAULT_REGION',    'value': 'ap-south-1'},
              {'name': 'TG_BOT_TOKEN',          'value': '${{ secrets.TG_BOT_TOKEN }}'},
              {'name': 'TG_ADMIN_CHAT',         'value': '${{ secrets.TG_ADMIN_CHAT }}'},
              {'name': 'ADMIN_SECRET',          'value': '${{ secrets.ADMIN_SECRET }}'},
          ]
          td['containerDefinitions'][0]['environment'] = env
          td['taskRoleArn'] = 'arn:aws:iam::802346121670:role/nexus-ecs-task-execution-role'

          with open('$RENDERED', 'w') as f:
              json.dump(td, f, indent=2)
          print('Injected', len(keys_to_inject), 'secret env vars successfully')
          "

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: nexus-control-tower-service
          cluster: nexus-cluster
          wait-for-service-stability: true

      - name: Verify download endpoint after deployment
        run: |
          echo "Waiting 15s for server to be ready..."
          sleep 15
          python3 -c "
          import requests, sys

          print('--- Checking update endpoint ---')
          r1 = requests.get('http://devash.in/api/update_check', timeout=10)
          print('Status:', r1.status_code, '| Body:', r1.text[:80])
          assert r1.status_code == 200, 'Update check endpoint failed'

          print('--- Checking download endpoint ---')
          r2 = requests.get('http://devash.in/download/latest.exe', timeout=60)
          print('HTTP Status:', r2.status_code)
          print('Size:', len(r2.content), 'bytes')

          if r2.status_code != 200:
              print('FAIL: Download returned HTTP', r2.status_code)
              print('Body:', r2.content[:100])
              sys.exit(1)

          if r2.content[:2] != b'MZ':
              print('FAIL: Downloaded file is not a valid EXE (missing MZ header)')
              print('Got:', r2.content[:60])
              sys.exit(1)

          size_mb = len(r2.content) / 1024 / 1024
          print(f'PASS: Valid EXE downloaded ({size_mb:.1f} MB)')
          "

      - name: Deployment Success Notification
        run: echo "Nexus Control Tower deployed successfully to ECS — ${{ github.sha }}"
